<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕷️ DREAMY THRIFT | Kalcer & Dreamy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-zinc-100 overflow-x-hidden">

    <section id="login-page" class="min-h-screen flex items-center justify-center p-6 relative">
        <div class="login-bg-aesthetic"></div>
        <div class="glass-login p-8 md:p-12 w-full max-w-md rounded-[2.5rem] z-10 text-center border border-white/10">
            <h2 class="text-3xl font-extrabold tracking-tighter mb-2 italic">Welcome Back</h2>
            <p class="text-zinc-400 text-sm mb-8">Login to start your dreamy journey.</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-xs font-bold uppercase ml-4 text-zinc-500 tracking-widest">Username</label>
                    <input type="text" id="username" placeholder="Any name..." class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-3 mt-1 focus:outline-none focus:ring-2 focus:ring-red-600/50 focus:border-red-600 transition-all text-sm">
                </div>
                <div class="text-left">
                    <label class="text-xs font-bold uppercase ml-4 text-zinc-500 tracking-widest">Password</label>
                    <input type="password" id="password" placeholder="Hint: 123" class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-3 mt-1 focus:outline-none focus:ring-2 focus:ring-red-600/50 focus:border-red-600 transition-all text-sm">
                </div>
                <button onclick="handleLogin()" class="w-full bg-white text-black font-black py-4 rounded-full mt-4 hover:bg-red-600 hover:text-white transition-all duration-500 uppercase tracking-widest text-sm shadow-xl shadow-white/5">
                    Login Now
                </button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-4 font-medium hidden">Password salah, silakan coba lagi!</p>
        </div>
    </section>

    <section id="dashboard-page" class="hidden min-h-screen relative">
        <div class="spider-web top-0 left-0 p-4 opacity-20"><i data-lucide="layout-grid" class="w-32 h-32"></i></div>
        <div class="spider-web bottom-0 right-0 p-4 opacity-20 rotate-180"><i data-lucide="layout-grid" class="w-40 h-40"></i></div>

        <nav class="fixed top-0 w-full z-50 p-4">
            <div class="max-w-6xl mx-auto glass rounded-full px-6 py-3 flex justify-between items-center border border-white/5">
                <h1 class="text-xl font-extrabold tracking-tighter flex items-center gap-2">
                    <i data-lucide="venom" class="text-red-600"></i> DREAMY<span class="text-zinc-500 italic">THRIFT</span>
                </h1>
                <button onclick="handleLogout()" class="text-xs font-bold uppercase hover:text-red-500 transition tracking-widest flex items-center gap-2">
                    Logout <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </nav>

        <header class="pt-32 pb-16 px-6 text-center">
            <div class="inline-block bg-white/5 px-4 py-1 rounded-full text-[10px] mb-4 text-red-500 border border-red-500/20 uppercase tracking-[0.3em]">🕷️ Spider Collection</div>
            <h2 class="text-5xl md:text-8xl font-extrabold mb-4 tracking-tighter">STAY <span class="text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 to-zinc-600 italic">KALCER</span></h2>
            <p class="text-zinc-500 max-w-md mx-auto text-sm leading-relaxed">Pakaian terpilih untuk lo yang paham estetika. Langka, berkelas, dan dreamy.</p>
        </header>

        <main class="max-w-6xl mx-auto px-6 pb-40">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </main>

        <div id="cartButton" class="fixed bottom-8 right-8 z-50 hidden">
            <button onclick="toggleCartModal()" class="cart-bounce bg-[#FFD700] text-black p-5 rounded-full shadow-[0_0_30px_rgba(255,215,0,0.3)] flex items-center gap-3 border-4 border-black">
                <i data-lucide="shopping-bag" class="w-7 h-7"></i>
                <span id="cartCount" class="bg-black text-white px-2 py-0.5 rounded-full text-xs font-bold">0</span>
            </button>
        </div>
    </section>

    <div id="cartModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl">
        <div class="glass w-full max-w-md rounded-[3rem] p-8 relative border border-white/10">
            <button onclick="toggleCartModal()" class="absolute top-8 right-8 text-zinc-500 hover:text-white transition"><i data-lucide="x"></i></button>
            <h2 class="text-3xl font-black mb-8 italic tracking-tighter">Your Bag 🕷️</h2>
            <div id="cartItems" class="max-h-[350px] overflow-y-auto mb-8 space-y-4 pr-2">
                </div>
            <div class="border-t border-white/10 pt-6 mb-8 text-center">
                <p class="text-zinc-500 text-xs uppercase tracking-widest mb-1">Estimated Total</p>
                <div id="totalPrice" class="text-3xl font-black text-white">Rp 0</div>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-[#25D366] text-black py-5 rounded-3xl font-black flex justify-center items-center gap-3 hover:scale-95 transition-transform">
                <i data-lucide="message-circle"></i> CHECKOUT VIA WHATSAPP
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
